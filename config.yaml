sweepstake:
  # Set to the number of players in your sweepstake.
  # teams_per_tier is computed automatically: max(1, round(24 / participants))
  # e.g. 13 players → 2 per tier (8 teams each)
  #       6 players → 4 per tier (16 teams each)
  #      24 players → 1 per tier (4 teams each)
  participants: 7

  # Budget each player receives to spend on add-ons (in the currency of your choice).
  # Set to 0 to disable budget tracking.
  budget_per_player: 15

  # Cost of each add-on purchase type (deducted from budget).
  # BuyIn is NOT deducted from the add-on budget.
  addon_costs:
    PredictionPack: 5
    Mulligan: 3
    NinthTeam: 3
    Resurrection: 3
    Insurance: 2

  balance_threshold: 20
  max_balance_iterations: 1000

scoring:
  strength_formula: "101 - fifa_rank"

colors:
  header_bg: [13, 27, 42]
  header_fg: [212, 160, 23]
  tier_1: [16, 90, 172]
  tier_2: [21, 128, 61]
  tier_3: [161, 98, 7]
  tier_4: [185, 28, 28]
  score_bg: [30, 41, 59]
